# gruvbox-dark — retro warm palette by Pavel Pertsev.
# Pairs with chroma's "gruvbox" code style (dark variant).

description: Gruvbox Dark — retro warm earth tones.
code-style: gruvbox

styles:
  name:    {color: "#83a598", bold: true}     # blue
  text:    {color: "#ebdbb2"}                  # fg1
  string:  {color: "#b8bb26"}                  # green
  number:  {color: "#d3869b"}                  # purple
  boolean: {color: "#d3869b"}
  "null":  {color: "#928374"}                  # gray
  syntax:  {color: "#ebdbb2", bold: true}
  code:    {color: "#fb4934"}                  # red
  anchor:  {color: "#83a598"}
  comment: {color: "#928374", faint: true}
  title:   {color: "#fbf1c7", bold: true}
  columns: {bold: true}
  rows:    {}
  headings:
    - {color: "#fb4934", bold: true}           # red
    - {color: "#fb4934", bold: true}
    - {color: "#fabd2f", bold: true}           # yellow
    - {color: "#b8bb26", bold: true}           # green
    - {color: "#8ec07c"}                       # aqua
    - {color: "#928374", faint: true}

border: normal
indent: "  "
